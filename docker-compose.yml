services:
  dotcms-db:
    image: postgres:15
    container_name: dotcms-db
    environment:
      POSTGRES_USER: dotcms
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dotcms
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - dotcms-network

  dotcms-search:
    image: opensearchproject/opensearch:2.11.0
    container_name: dotcms-search
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - search_data:/usr/share/opensearch/data
    networks:
      - dotcms-network

  dotcms:
    image: dotcms/dotcms:latest
    container_name: dotcms-core
    environment:
      DB_BASE_URL: jdbc:postgresql://dotcms-db:5432/dotcms
      DB_USERNAME: dotcms
      DB_PASSWORD: password
      ES_ENDPOINTS: https://dotcms-search:9200
      DOT_ES_AUTH_TYPE: NONE
      CMS_HEAP_SIZE: 2g
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./plugins:/data/shared/assets/plugins
      - ./server/conf:/data/shared/server/conf
      - cms_assets:/data/shared/assets
    depends_on:
      - dotcms-db
      - dotcms-search
    networks:
      - dotcms-network

networks:
  dotcms-network:
    driver: bridge

volumes:
  db_data:
  search_data:
  cms_assets:
