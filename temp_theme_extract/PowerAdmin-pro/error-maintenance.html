<body>
  <div class="error-page">
    <div class="error-wrapper">
      <!-- Decorative background shapes -->
      <div class="error-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>

      <div class="error-content">
        <!-- Logo -->
        <div class="error-logo">
          <a href="index.html">
            <img src="assets/img/logo.webp" alt="PowerAdmin">
          </a>
        </div>

        <!-- Animated gear icon -->
        <div class="error-status-icon maintenance">
          <div class="status-icon-ring">
            <i class="bi bi-gear-fill"></i>
          </div>
        </div>

        <h1 class="error-title">Under Maintenance</h1>
        <p class="error-message">
          We're performing scheduled maintenance to improve your experience.
          All systems will be back online shortly. Thank you for your patience.
        </p>

        <!-- Progress indicator -->
        <div class="maintenance-progress">
          <div class="progress-info">
            <span>Estimated completion</span>
            <span class="progress-time">~2 hours</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width: 65%"></div>
          </div>
        </div>

        <!-- Status checklist -->
        <div class="maintenance-checklist">
          <div class="checklist-item completed">
            <i class="bi bi-check-circle-fill"></i>
            <span>Database migration</span>
          </div>
          <div class="checklist-item completed">
            <i class="bi bi-check-circle-fill"></i>
            <span>Security patches</span>
          </div>
          <div class="checklist-item active">
            <i class="bi bi-arrow-repeat"></i>
            <span>System optimization</span>
          </div>
          <div class="checklist-item">
            <i class="bi bi-circle"></i>
            <span>Final testing</span>
          </div>
        </div>

        <!-- Social links -->
        <div class="error-social">
          <span class="social-label">Follow us for updates</span>
          <div class="social-links">
            <a href="#" class="social-link" title="Twitter">
              <i class="bi bi-twitter-x"></i>
            </a>
            <a href="#" class="social-link" title="Facebook">
              <i class="bi bi-facebook"></i>
            </a>
            <a href="#" class="social-link" title="Instagram">
              <i class="bi bi-instagram"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
