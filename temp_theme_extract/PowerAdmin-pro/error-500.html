<body>
  <div class="error-page">
    <div class="error-wrapper">
      <!-- Decorative background shapes -->
      <div class="error-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>

      <div class="error-content">
        <!-- Danger icon with pulse -->
        <div class="error-status-icon danger">
          <div class="status-icon-ring">
            <i class="bi bi-exclamation-triangle-fill"></i>
          </div>
          <div class="status-pulse"></div>
        </div>

        <div class="error-code-badge danger">Error 500</div>

        <h1 class="error-title">Internal Server Error</h1>
        <p class="error-message">
          Something went wrong on our end. Our engineering team has been automatically
          notified and is working on a fix. Please try again in a few moments.
        </p>

        <div class="error-details-panel">
          <div class="details-header">
            <i class="bi bi-terminal me-2"></i>Error Details
          </div>
          <div class="details-body">
            <div class="detail-row">
              <span class="detail-label">Status</span>
              <span class="detail-value text-danger">500 Internal Server Error</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Timestamp</span>
              <span class="detail-value" data-error-time>--</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Request ID</span>
              <span class="detail-value font-monospace">req_7f3a8b2c</span>
            </div>
          </div>
        </div>

        <div class="error-actions">
          <a href="index.html" class="btn btn-primary btn-lg">
            <i class="bi bi-house-door me-2"></i>Back to Home
          </a>
          <button class="btn btn-outline-secondary btn-lg" onclick="location.reload()">
            <i class="bi bi-arrow-clockwise me-2"></i>Try Again
          </button>
        </div>
      </div>
    </div>

  <script>
    // Display current timestamp
    (function() {
      const el = document.querySelector('[data-error-time]');
      if (el) {
        const now = new Date();
        el.textContent = now.toLocaleString('en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      }
    })();
